<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icons/icon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#06110f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Heat Limit" />
    <title>Heat Limit</title>
  <style>
    :root {
      --bg: #050807;
      --ink: #121212;
      --paper: #d7caa7;
      --paper-deep: #baa97f;
      --panel: #e2d4ae;
      --panel-deep: #9e8a5c;
      --muted: #5c543e;
      --line: rgba(17, 17, 17, 0.76);
      --line-soft: rgba(17, 17, 17, 0.42);
      --shadow: rgba(0, 0, 0, 0.38);
      --scene-accent: #ea7b35;
      --scene-accent-soft: #ffd2ac;
      --scene-accent-deep: #8f4219;
      --scene-glow: rgba(234, 123, 53, 0.34);
      --scene-surface: linear-gradient(180deg, rgba(247, 239, 213, 0.95), rgba(190, 168, 117, 0.82));
      --scene-symbol: "◉";
      --scene-label: "АВАРИЯ";
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 15%, rgba(255, 190, 96, 0.08), transparent 18%),
        radial-gradient(circle at 18% 20%, rgba(130, 174, 100, 0.08), transparent 16%),
        radial-gradient(circle at 82% 22%, rgba(88, 150, 186, 0.07), transparent 18%),
        linear-gradient(180deg, #020403 0%, #060907 45%, #090c09 100%);
      color: var(--ink);
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      display: grid;
      place-items: center;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .phone {
      width: min(100vw, 430px);
      height: min(100dvh, 780px);
      min-height: 0;
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), transparent 22%),
        linear-gradient(180deg, #1d1c16 0%, #0f110d 18%, #070908 100%);
      box-shadow:
        0 0 0 2px rgba(255, 238, 194, 0.12),
        0 0 0 10px #050505,
        0 36px 110px rgba(0, 0, 0, 0.58);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255, 237, 201, 0.12);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 24%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 44%);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .phone.shake {
      animation: shake 210ms steps(4, end);
    }

    @keyframes shake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-4px, 2px); }
      40% { transform: translate(4px, -3px); }
      60% { transform: translate(-3px, -2px); }
      80% { transform: translate(3px, 2px); }
      100% { transform: translate(0, 0); }
    }

    .screen {
      position: absolute;
      inset: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      z-index: 1;
    }

    .top-panel,
    .arena,
    .card-area,
    .overlay-card,
    .menu-card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 248, 223, 0.92), rgba(200, 181, 134, 0.88)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.25), transparent 35%);
      border: 1px solid var(--line);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.34),
        0 12px 24px var(--shadow);
      overflow: hidden;
    }

    .top-panel::after,
    .arena::after,
    .card-area::after,
    .overlay-card::after,
    .menu-card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(315deg, rgba(0,0,0,0.1), transparent 18%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 8px);
      mix-blend-mode: soft-light;
      opacity: 0.65;
    }

    .top-panel {
      border-radius: 18px 18px 14px 14px;
      padding: 10px 12px 12px;
      display: grid;
      gap: 10px;
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(20px, 4.9vw, 29px);
      line-height: 1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #16150f;
    }

    .top-row > *:first-child {
      justify-self: start;
    }

    .top-row > *:nth-child(2) {
      justify-self: center;
    }

    .top-row > *:last-child {
      justify-self: end;
    }

    .top-row b,
    .bar-label b,
    .deck-stats-value,
    .overlay-title,
    .menu-title,
    .card-name,
    .reward-name,
    .deck-entry-name {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .menu-button {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #2d2b23, #0c0d0b);
      color: #efe5c7;
      box-shadow: 0 6px 0 rgba(0,0,0,0.4);
      min-height: 34px;
      padding: 4px 12px;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 10px;
    }

    .menu-button:active {
      transform: translateY(2px);
      box-shadow: 0 4px 0 rgba(0,0,0,0.4);
    }

    .bar-wrap {
      display: grid;
      gap: 5px;
    }

    .bar-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      line-height: 1;
      letter-spacing: 0.03em;
      font-weight: 900;
      text-transform: uppercase;
      color: #232018;
    }

    .bar {
      position: relative;
      height: 30px;
      border: 1px solid rgba(19, 20, 16, 0.88);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(12, 14, 11, 0.98), rgba(33, 38, 27, 0.98)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 24px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    }

    .bar::before {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 5px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
      pointer-events: none;
    }

    .bar-fill {
      position: relative;
      height: 100%;
      width: 0%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.22), transparent),
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent),
        linear-gradient(90deg, #6da85a, #b0cf70);
      transition: width 420ms cubic-bezier(.2, .9, .2, 1);
      box-shadow: inset 0 0 14px rgba(255,255,255,0.14);
    }

    .heat-fill {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.2), transparent),
        linear-gradient(90deg, #ffb14d, #f36f2f 72%, #c64a1f);
      box-shadow: inset 0 0 18px rgba(255, 170, 92, 0.28);
    }

    .heat-fill.danger {
      animation: heatPulse 340ms steps(2, end) infinite;
    }

    @keyframes heatPulse {
      0%, 100% { opacity: 1; filter: saturate(1); }
      50% { opacity: 0.6; filter: saturate(1.2); }
    }

    .arena {
      border-radius: 18px;
      padding: 12px 12px 10px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(235, 220, 183, 0.94), rgba(206, 184, 138, 0.92)),
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.28), transparent 32%);
    }

    .enemy-title {
      text-align: center;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(30px, 6.2vw, 46px);
      line-height: 0.94;
      letter-spacing: 0.03em;
      color: #16150f;
      text-transform: uppercase;
    }

    .enemy-subtitle {
      margin-top: 4px;
      text-align: center;
      font-size: 14px;
      line-height: 1.08;
      letter-spacing: 0.03em;
      text-transform: lowercase;
      color: rgba(22, 21, 15, 0.72);
    }

    .enemy-zone {
      display: none;
    }

    .world-container {
      position: relative;
      min-height: 220px;
      border-radius: 16px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(180deg, rgba(10, 17, 15, 0.98), rgba(5, 8, 7, 0.98));
      touch-action: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.34);
    }

    .world-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .sparks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f9d06b;
      box-shadow: 0 0 12px rgba(249, 208, 107, 0.8);
      animation: spark 420ms ease-out forwards;
    }

    @keyframes spark {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0); opacity: 0; }
    }

    .float-text {
      position: absolute;
      left: 50%;
      top: 43%;
      transform: translate(-50%, -50%);
      background: rgba(18, 17, 13, 0.95);
      color: #f7e8c0;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.02em;
      pointer-events: none;
      text-transform: uppercase;
      animation: floatUp 650ms cubic-bezier(.2, .9, .2, 1) forwards;
      z-index: 10;
      box-shadow: 0 10px 18px rgba(0,0,0,0.28);
    }

    .float-text.heat {
      top: 10%;
      background: rgba(88, 28, 12, 0.95);
      color: #ffd6ac;
    }

    @keyframes floatUp {
      0% { transform: translate(-50%, 16px) scale(.82); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translate(-50%, -64px) scale(1.06); opacity: 0; }
    }

    .enemy-hp {
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .message {
      min-height: 62px;
      border-radius: 14px;
      border: 1px solid rgba(13, 14, 11, 0.86);
      background:
        linear-gradient(180deg, rgba(20, 23, 18, 0.95), rgba(11, 13, 10, 0.96)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 36%);
      color: #c8d0a5;
      padding: 12px 14px 12px 56px;
      font-size: 16px;
      line-height: 1.16;
      display: grid;
      align-content: center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 8px 16px rgba(0,0,0,0.34);
      position: relative;
    }

    .message::before {
      content: "✎";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(213, 228, 170, 0.1);
      color: var(--scene-accent-soft, #d8f3c0);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .message b {
      font-weight: 900;
      color: #ecf0c9;
    }

    .active-effects {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .active-effect {
      border-radius: 999px;
      border: 1px solid rgba(15, 17, 12, 0.72);
      background: rgba(225, 234, 189, 0.68);
      padding: 5px 10px;
      font-size: 12px;
      line-height: 1.05;
      font-weight: 900;
      color: #252418;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.38);
    }

    .hand-panel {
      display: grid;
      gap: 10px;
      align-self: end;
      min-height: 0;
    }

    .card-area {
      border-radius: 18px;
      padding: 11px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(226, 212, 173, 0.96), rgba(181, 159, 111, 0.9)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.16), transparent 34%);
    }

    .card {
      container-type: inline-size;
      min-width: 0;
      min-height: 166px;
      padding: 0;
      border: 1px solid rgba(20, 18, 16, 0.9);
      border-radius: 18px;
      background: transparent;
      box-shadow:
        0 12px 22px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      transition: transform 100ms linear, box-shadow 100ms linear;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 16%),
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 20%),
        radial-gradient(circle at 50% 0%, var(--card-glow, rgba(255,255,255,0.16)), transparent 38%);
      pointer-events: none;
      opacity: 0.9;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(14, 14, 12, 0.35);
      pointer-events: none;
      opacity: 0.7;
    }

    .card-frame {
      position: relative;
      min-height: 166px;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 6px;
      padding: 10px 10px 9px;
      background:
        var(--card-surface, linear-gradient(180deg, rgba(248,242,224,0.96), rgba(189,171,118,0.9))),
        linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
      color: #1b180f;
    }

    .card-topline {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      min-height: 22px;
      min-width: 0;
    }

    .card-chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 20px;
      padding: 2px 7px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--card-accent-soft, #f7e9ba) 62%, white);
      border: 1px solid rgba(17, 17, 14, 0.22);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1a1710;
      overflow: hidden;
      white-space: nowrap;
    }

    .card-name {
      align-self: end;
      text-align: center;
      font-size: clamp(19px, calc(150cqw / var(--card-name-length, 6)), 28px);
      line-height: 0.88;
      color: #11110d;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .card-icon {
      align-self: start;
      font-size: 13px;
      line-height: 1.1;
      font-weight: 900;
      padding: 0 4px;
      min-height: 0;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
      text-align: center;
      color: rgba(17, 17, 13, 0.8);
    }

    .card-effects {
      align-self: end;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      justify-content: center;
      align-items: center;
      min-width: 0;
      font-size: 12px;
      line-height: 1.05;
      font-weight: 900;
      color: #16150f;
    }

    .effect-line {
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      max-width: 100%;
      min-width: 0;
      padding: 3px 6px;
      margin-bottom: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(18,18,14,0.12);
      white-space: nowrap;
    }

    .effect-line span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .emoji {
      flex: 0 0 auto;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      font-weight: 400;
    }

    .card:hover:not(:disabled),
    .reward-button:hover:not(:disabled),
    .menu-item:hover {
      filter: brightness(1.03);
    }

    .card:active:not(:disabled) {
      transform: translateY(2px) scale(0.99);
      box-shadow:
        0 8px 16px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .card:disabled {
      opacity: 0.55;
      filter: saturate(0.8);
      box-shadow: none;
    }

    .card.fly {
      position: absolute;
      margin: 0;
      left: 0;
      top: 0;
      transform-origin: center;
      pointer-events: none;
      will-change: transform, opacity;
      z-index: 30;
    }

    .card.fly .card-effects {
      white-space: normal;
    }

    .deck-strip {
      display: grid;
      grid-template-columns: minmax(88px, 1fr) minmax(126px, 1.2fr) minmax(88px, 1fr);
      gap: 10px;
      align-items: stretch;
      color: var(--ink);
    }

    .deck-stats,
    .deck-button {
      min-height: 66px;
      border: 1px solid rgba(18, 18, 13, 0.8);
      border-radius: 14px;
      display: grid;
      align-content: center;
      padding: 8px 10px;
      box-shadow: 0 10px 18px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .deck-stats {
      background:
        linear-gradient(180deg, rgba(242, 233, 204, 0.96), rgba(198, 176, 126, 0.92)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.2), transparent 34%);
      gap: 2px;
    }

    .deck-stats-label {
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.08em;
      color: rgba(22, 20, 15, 0.74);
      text-transform: uppercase;
      font-weight: 900;
    }

    .deck-stats-value {
      font-size: 24px;
      line-height: 1;
      color: #18170f;
    }

    .deck-button {
      background:
        linear-gradient(180deg, #394d2d, #1d2518 55%, #11150f),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.1), transparent 38%);
      color: #e8f2c8;
      text-align: center;
      font-size: 18px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .deck-button span {
      display: block;
      font-size: 11px;
      font-weight: 700;
      opacity: 0.82;
      margin-top: 4px;
      letter-spacing: 0.08em;
    }

    .deck-button:active {
      transform: translateY(2px);
      box-shadow: 0 7px 14px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .animation-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 18;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(6, 8, 6, 0.76);
      display: none;
      place-items: center;
      z-index: 20;
      padding: 18px;
    }

    .menu-overlay {
      position: absolute;
      inset: 0;
      background: rgba(4, 5, 4, 0.58);
      display: none;
      place-items: start end;
      z-index: 25;
      padding: 18px;
    }

    .menu-overlay.show {
      display: grid;
    }

    .menu-card {
      width: min(260px, 100%);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 10px;
      background:
        linear-gradient(180deg, rgba(241, 231, 202, 0.96), rgba(193, 168, 117, 0.92));
    }

    .menu-title {
      font-size: 28px;
      line-height: 0.92;
      color: #17140f;
    }

    .menu-actions {
      display: grid;
      gap: 8px;
    }

    .world-editor {
      display: none;
      gap: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(17, 17, 17, 0.22);
    }

    .world-editor.show {
      display: grid;
    }

    .world-editor-title {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .world-editor-tools {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .editor-tool {
      min-height: 32px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(208, 190, 140, 0.9));
      border-radius: 10px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .editor-tool.selected {
      background: linear-gradient(180deg, rgba(255, 244, 194, 0.98), rgba(225, 190, 115, 0.96));
      box-shadow: inset 0 0 0 1px rgba(17, 17, 17, 0.2);
    }

    .world-editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .editor-field {
      display: grid;
      gap: 4px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 0.72);
    }

    .editor-field select {
      min-height: 32px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 249, 228, 0.9);
      font: inherit;
    }

    .world-editor-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .menu-item {
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(18, 18, 13, 0.76);
      background: linear-gradient(180deg, #f5edd0, #d4c08a);
      font-size: 15px;
      font-weight: 900;
      text-align: left;
      padding: 8px 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.22);
    }

    .menu-item:active {
      transform: translateY(1px);
      background: linear-gradient(180deg, #1a1b15, #0b0c0a);
      color: #efe6c8;
    }

    .overlay.show {
      display: grid;
    }

    .overlay-card {
      width: min(370px, 100%);
      height: min(calc(100dvh - 36px), 100%);
      max-height: calc(100dvh - 36px);
      border-radius: 18px;
      overflow: hidden;
      padding: 16px;
      text-align: center;
      display: grid;
      gap: 12px;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      min-height: 0;
    }

    .overlay-title {
      font-size: 28px;
      line-height: 0.92;
      color: #17140f;
    }

    .overlay-text {
      font-size: 15px;
      line-height: 1.22;
      color: rgba(22, 20, 15, 0.72);
    }

    .overlay-list {
      min-height: 0;
      max-height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .overlay-list.deck-view {
      gap: 6px;
      text-align: left;
    }

    .deck-entry {
      position: relative;
      border-radius: 14px;
      border: 1px solid rgba(18, 18, 13, 0.76);
      background:
        linear-gradient(180deg, rgba(250, 245, 227, 0.96), rgba(216, 199, 150, 0.92));
      min-height: 72px;
      padding: 8px 9px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      text-align: left;
      box-shadow: 0 8px 16px rgba(0,0,0,0.16);
      overflow: hidden;
    }

    .deck-entry::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, color-mix(in srgb, var(--card-accent, #d4c08a) 18%, transparent), transparent 46%);
      opacity: 0.56;
      pointer-events: none;
    }

    .deck-entry-main {
      display: grid;
      gap: 4px;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .deck-entry-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .deck-entry-name {
      font-size: 16px;
      line-height: 1;
      min-width: 0;
      color: #17140f;
    }

    .deck-entry-effects {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 4px;
      font-size: 12px;
      line-height: 1.15;
      font-weight: 900;
      color: rgba(22, 20, 15, 0.68);
      text-align: right;
      min-width: 0;
    }

    .deck-entry-desc {
      font-size: 12px;
      line-height: 1.18;
      color: rgba(22, 20, 15, 0.68);
      position: relative;
      z-index: 1;
    }

    .deck-entry-count {
      font-size: 12px;
      font-weight: 900;
      align-self: start;
      opacity: 0.75;
      position: relative;
      z-index: 1;
    }

    .debug-deck-view {
      text-align: left;
    }

    .debug-panel {
      border-radius: 14px;
      border: 1px solid rgba(18, 18, 13, 0.76);
      background: rgba(250, 243, 219, 0.7);
      padding: 8px;
      display: grid;
      gap: 7px;
    }

    .debug-panel-title {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      color: rgba(22, 20, 15, 0.7);
      text-transform: uppercase;
    }

    .debug-add-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .debug-add-card,
    .debug-remove-card {
      border: 1px solid rgba(18, 18, 13, 0.76);
      background: linear-gradient(180deg, #fbf6e4, #dccb96);
      font-weight: 900;
      border-radius: 12px;
      box-shadow: 0 8px 14px rgba(0,0,0,0.16);
    }

    .debug-add-card {
      min-height: 72px;
      padding: 7px 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: start;
      gap: 4px;
      text-align: left;
      font-size: 12px;
      line-height: 1.1;
    }

    .debug-add-name {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.05;
    }

    .debug-add-desc {
      display: grid;
      align-content: start;
      font-size: 12px;
      line-height: 1.14;
      font-weight: 700;
      text-align: left;
      white-space: normal;
      word-break: break-word;
    }

    .debug-deck-entry {
      grid-template-columns: 1fr auto;
      align-items: start;
    }

    .debug-remove-card {
      min-height: 36px;
      padding: 5px 7px;
      font-size: 11px;
      align-self: center;
    }

    .debug-add-card:active,
    .debug-remove-card:active {
      transform: translateY(1px);
      background: linear-gradient(180deg, #181812, #0b0c0a);
      color: #f0e7c9;
    }

    .debug-add-card:disabled,
    .debug-remove-card:disabled {
      opacity: .55;
    }

    .debug-empty {
      border: 1px dashed rgba(18, 18, 13, 0.4);
      color: rgba(22, 20, 15, 0.65);
      border-radius: 12px;
      background: rgba(255,255,255,0.24);
      padding: 10px;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .reward-button {
      border: 1px solid rgba(18, 18, 13, 0.76);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(251, 247, 232, 0.96), rgba(220, 204, 158, 0.92));
      min-height: 76px;
      padding: 8px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px;
      align-items: center;
      text-align: left;
      align-self: start;
      box-shadow: 0 8px 16px rgba(0,0,0,0.16);
    }

    .reward-button:active {
      transform: translateY(1px);
      background: linear-gradient(180deg, #151713, #0b0c0a);
      color: #f2e8c8;
    }

    .reward-button:disabled {
      opacity: .58;
    }

    .reward-button.save-button.selected {
      background: linear-gradient(180deg, #e2f0c8, #b6cc7d);
    }

    .reward-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(18, 18, 13, 0.28);
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      padding: 3px 4px;
      white-space: normal;
      word-break: break-word;
      text-align: center;
      color: var(--card-accent-deep, #6d5d34);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--card-accent-soft, #f2e4af) 50%, white), color-mix(in srgb, var(--card-accent, #d4c08a) 40%, #ffffff));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.4),
        0 8px 14px rgba(0,0,0,0.14);
    }

    .reward-name {
      font-size: 17px;
      line-height: 1;
      margin-bottom: 5px;
      color: #17140f;
    }

    .reward-desc {
      font-size: 13px;
      line-height: 1.15;
      color: rgba(22, 20, 15, 0.7);
    }

    .big-button {
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid rgba(18, 18, 13, 0.76);
      background: linear-gradient(180deg, #222722, #0b0c0b);
      color: #efe6c8;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 10px 16px rgba(0,0,0,0.22);
    }

    .overlay-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .cycle-banner {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(180deg, #1b1e16, #090a08);
      color: #f4e9c8;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 20px;
      font-weight: 900;
      display: none;
      z-index: 12;
      white-space: nowrap;
      box-shadow: 0 18px 32px rgba(0,0,0,0.3);
      text-transform: uppercase;
    }

    .cycle-banner.show {
      display: block;
      animation: banner 760ms cubic-bezier(.2, .9, .2, 1) forwards;
    }

    @keyframes banner {
      0% { transform: translate(-50%, -50%) scale(.74); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
      75% { opacity: 1; }
      100% { transform: translate(-50%, -72%) scale(1); opacity: 0; }
    }

    @media (max-width: 420px) {
      .screen {
        inset: 10px;
        gap: 10px;
      }

      .top-panel,
      .arena,
      .card-area {
        border-radius: 16px;
      }

      .card-area {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        padding: 9px;
      }

      .card {
        min-height: 154px;
      }

      .card-frame {
        padding: 9px 8px 8px;
      }

      .arena {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="phone" id="phone">
    <div class="animation-layer" id="animationLayer"></div>
    <section class="screen">
      <header class="top-panel">
        <div class="top-row">
          <span id="stageText">СПУТНИК 1/5</span>
          <button class="menu-button" id="menuButton" type="button">МЕНЮ</button>
          <span>ХОД <b id="actionsText">0/2</b></span>
        </div>
        <div class="bar-wrap">
          <div class="bar-label">
            <span>🔥 ПЕРЕГРЕВ</span>
            <b id="heatText">0/10</b>
          </div>
          <div class="bar"><div class="bar-fill heat-fill" id="heatFill"></div></div>
        </div>
      </header>

      <section class="arena">
        <div>
          <div class="enemy-title" id="enemyTitle">ПРОБОЙ ТРУБЫ</div>
          <div class="enemy-subtitle" id="enemySubtitle">в конце цикла: 🔥+2</div>
        </div>

        <div class="world-container" id="worldContainer"></div>

        <div class="enemy-hp">
          <div class="bar-label">
            <span>ПРОГРЕСС РЕМОНТА</span>
            <b id="hpText">0/22</b>
          </div>
          <div class="bar"><div class="bar-fill" id="hpFill"></div></div>
          <div class="message" id="message">Выбери карту. Тап сразу применяет действие.</div>
          <div class="active-effects" id="activeEffects" hidden></div>
        </div>
      </section>

      <section class="hand-panel">
        <section class="card-area" id="cardArea"></section>
        <div class="deck-strip">
          <div class="deck-stats" id="drawPilePanel">
            <div class="deck-stats-label">Доступно</div>
            <div class="deck-stats-value" id="drawPileCount">0</div>
          </div>
          <button class="deck-button" id="deckButton" type="button">
            МУЛЬТИТУЛ
          </button>
          <div class="deck-stats" id="discardPanel">
            <div class="deck-stats-label">Остывают</div>
            <div class="deck-stats-value" id="discardCount">0</div>
          </div>
        </div>
      </section>
    </section>

    <div class="cycle-banner" id="cycleBanner">АВАРИЯ ОТВЕЧАЕТ</div>

    <div class="overlay" id="overlay">
      <div class="overlay-card">
        <div class="overlay-title" id="overlayTitle">ГОТОВО</div>
        <div class="overlay-text" id="overlayText">Поломка устранена.</div>
        <div class="overlay-list" id="rewardList"></div>
        <div class="overlay-actions">
          <button class="big-button" id="overlayCloseButton" type="button" style="display:none">ЗАКРЫТЬ</button>
          <button class="big-button" id="restartButton" type="button" style="display:none">НОВЫЙ ЗАПУСК</button>
        </div>
      </div>
    </div>

    <div class="menu-overlay" id="menuOverlay">
      <div class="menu-card">
        <div class="menu-title">МЕНЮ</div>
        <div class="menu-actions">
          <button class="menu-item" id="menuRestartButton" type="button">НОВЫЙ ЗАПУСК</button>
          <button class="menu-item" id="menuDebugButton" type="button">ОТЛАДКА КОЛОДЫ</button>
          <button class="menu-item" id="menuWorldButton" type="button">РЕДАКТОР КАРТЫ</button>
          <button class="menu-item" id="menuCloseButton" type="button">ЗАКРЫТЬ</button>
        </div>
        <div class="world-editor" id="worldEditor">
          <div class="world-editor-title">РЕДАКТОР КАРТЫ</div>
          <div class="world-editor-tools">
            <button class="editor-tool selected" id="editorToolPan" type="button">PAN</button>
            <button class="editor-tool" id="editorToolPaint" type="button">TILE</button>
            <button class="editor-tool" id="editorToolBuild" type="button">BUILD</button>
            <button class="editor-tool" id="editorToolToggle" type="button">TOGGLE</button>
            <button class="editor-tool" id="editorToolErase" type="button">ERASE</button>
          </div>
          <div class="world-editor-grid">
            <label class="editor-field">
              <span>Tile</span>
              <select id="editorTileSelect"></select>
            </label>
            <label class="editor-field">
              <span>Building</span>
              <select id="editorBuildingSelect"></select>
            </label>
          </div>
          <div class="world-editor-actions">
            <button class="menu-item" id="worldSaveButton" type="button">SAVE</button>
            <button class="menu-item" id="worldResetButton" type="button">RESET</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
